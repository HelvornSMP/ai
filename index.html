<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Chat</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700;900&family=Rajdhani:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #8b5cf6;
            --primary-dark: #7c3aed;
            --secondary: #3b82f6;
            --bg-dark: #0a0a0f;
            --bg-card: rgba(17, 17, 27, 0.8);
            --bg-input: rgba(30, 30, 45, 0.6);
            --text-primary: #e0e0ff;
            --text-secondary: #a0a0c0;
            --border: rgba(139, 92, 246, 0.2);
            --glow: rgba(139, 92, 246, 0.4);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Rajdhani', sans-serif;
            background: var(--bg-dark);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            position: relative;
            overflow: hidden;
        }

        .stars, .stars2, .stars3 {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

        .stars {
            background: transparent url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" width="2" height="2"><circle cx="1" cy="1" r="1" fill="%238b5cf6" opacity="0.3"/></svg>') repeat;
            animation: starsAnimation 100s linear infinite;
        }

        .stars2 {
            background: transparent url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" width="3" height="3"><circle cx="1.5" cy="1.5" r="1" fill="%233b82f6" opacity="0.2"/></svg>') repeat;
            animation: starsAnimation 150s linear infinite;
        }

        .stars3 {
            background: transparent url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" width="4" height="4"><circle cx="2" cy="2" r="1" fill="%23ffffff" opacity="0.1"/></svg>') repeat;
            animation: starsAnimation 200s linear infinite;
        }

        @keyframes starsAnimation {
            from { transform: translateY(0); }
            to { transform: translateY(-100vh); }
        }

        .container {
            width: 100%;
            max-width: 1000px;
            height: 90vh;
            max-height: 900px;
            background: var(--bg-card);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: 16px;
            box-shadow: 
                0 0 80px rgba(139, 92, 246, 0.1),
                inset 0 0 40px rgba(139, 92, 246, 0.05);
            display: flex;
            flex-direction: column;
            position: relative;
            z-index: 1;
            overflow: hidden;
        }

        .container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 200px;
            background: radial-gradient(ellipse at top, rgba(139, 92, 246, 0.15), transparent);
            pointer-events: none;
        }

        .chat-header {
            padding: 30px 35px 20px;
            position: relative;
        }

        .header-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .chat-header h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 32px;
            font-weight: 900;
            letter-spacing: 3px;
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: 0 0 30px var(--glow);
        }

        .status-badge {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px 16px;
            background: rgba(139, 92, 246, 0.1);
            border: 1px solid var(--border);
            border-radius: 20px;
            font-size: 14px;
            font-weight: 600;
            letter-spacing: 1px;
        }

        .pulse {
            width: 10px;
            height: 10px;
            background: #10b981;
            border-radius: 50%;
            box-shadow: 0 0 10px #10b981;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.7; transform: scale(1.1); }
        }

        .header-line {
            height: 2px;
            background: linear-gradient(90deg, 
                transparent 0%, 
                var(--primary) 30%, 
                var(--secondary) 70%, 
                transparent 100%);
            box-shadow: 0 0 10px var(--glow);
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 30px 35px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .chat-messages::-webkit-scrollbar {
            width: 8px;
        }

        .chat-messages::-webkit-scrollbar-track {
            background: rgba(30, 30, 45, 0.3);
            border-radius: 4px;
        }

        .chat-messages::-webkit-scrollbar-thumb {
            background: var(--primary);
            border-radius: 4px;
            box-shadow: 0 0 10px var(--glow);
        }

        .message-wrapper {
            display: flex;
            animation: messageSlide 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes messageSlide {
            from {
                opacity: 0;
                transform: translateY(20px) scale(0.95);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        .message-wrapper.user {
            justify-content: flex-end;
        }

        .message-bubble {
            max-width: 75%;
            padding: 18px 22px;
            border-radius: 12px;
            position: relative;
        }

        .message-wrapper.bot .message-bubble {
            background: rgba(139, 92, 246, 0.08);
            border: 1px solid var(--border);
            border-left: 3px solid var(--primary);
        }

        .message-wrapper.user .message-bubble {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            border: 1px solid rgba(139, 92, 246, 0.5);
            box-shadow: 0 4px 20px rgba(139, 92, 246, 0.3);
        }

        .message-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            font-size: 12px;
            font-weight: 600;
            letter-spacing: 1px;
            opacity: 0.8;
        }

        .sender {
            color: var(--primary);
        }

        .message-wrapper.user .sender {
            color: rgba(255, 255, 255, 0.9);
        }

        .timestamp {
            color: var(--text-secondary);
            font-size: 11px;
        }

        .message-text {
            line-height: 1.6;
            font-size: 16px;
            font-weight: 400;
            white-space: pre-wrap;
            word-wrap: break-word;
        }

        .typing-indicator {
            display: flex;
            gap: 6px;
            padding: 10px 0;
        }

        .typing-indicator span {
            width: 8px;
            height: 8px;
            background: var(--primary);
            border-radius: 50%;
            animation: typing 1.4s infinite;
            box-shadow: 0 0 8px var(--glow);
        }

        .typing-indicator span:nth-child(2) {
            animation-delay: 0.2s;
        }

        .typing-indicator span:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes typing {
            0%, 60%, 100% {
                transform: translateY(0);
                opacity: 0.7;
            }
            30% {
                transform: translateY(-12px);
                opacity: 1;
            }
        }

        .chat-input-area {
            padding: 25px 35px 30px;
            background: rgba(10, 10, 15, 0.5);
            border-top: 1px solid var(--border);
        }

        .input-container {
            display: flex;
            gap: 15px;
            align-items: flex-end;
        }

        #userInput {
            flex: 1;
            padding: 16px 20px;
            background: var(--bg-input);
            border: 1px solid var(--border);
            border-radius: 12px;
            color: var(--text-primary);
            font-family: 'Rajdhani', sans-serif;
            font-size: 16px;
            font-weight: 400;
            resize: none;
            max-height: 150px;
            transition: all 0.3s ease;
        }

        #userInput:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 20px var(--glow), inset 0 0 20px rgba(139, 92, 246, 0.1);
        }

        #userInput::placeholder {
            color: var(--text-secondary);
        }

        #sendButton {
            padding: 16px 28px;
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            border: 1px solid rgba(139, 92, 246, 0.5);
            border-radius: 12px;
            color: white;
            font-family: 'Orbitron', sans-serif;
            font-size: 14px;
            font-weight: 700;
            letter-spacing: 2px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 20px rgba(139, 92, 246, 0.3);
        }

        #sendButton:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 30px rgba(139, 92, 246, 0.5);
            background: linear-gradient(135deg, var(--primary-dark) 0%, var(--primary) 100%);
        }

        #sendButton:active {
            transform: translateY(0);
        }

        #sendButton:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        @media (max-width: 768px) {
            body {
                padding: 0;
            }
            
            .container {
                height: 100vh;
                max-height: 100vh;
                border-radius: 0;
                border: none;
            }
            
            .chat-header h1 {
                font-size: 24px;
            }
            
            .chat-messages {
                padding: 20px;
            }
            
            .message-bubble {
                max-width: 85%;
            }
            
            #sendButton span {
                display: none;
            }
            
            #sendButton {
                padding: 16px;
            }
        }
    </style>
</head>
<body>
    <div class="stars"></div>
    <div class="stars2"></div>
    <div class="stars3"></div>
    
    <div class="container">
        <div class="chat-header">
            <div class="header-content">
                <h1>AI ASSISTANT</h1>
                <div class="status-badge">
                    <span class="pulse"></span>
                    <span>ONLINE</span>
                </div>
            </div>
            <div class="header-line"></div>
        </div>
        
        <div class="chat-messages" id="chatMessages">
            <div class="message-wrapper bot">
                <div class="message-bubble">
                    <div class="message-header">
                        <span class="sender">SYSTEM</span>
                        <span class="timestamp" id="initialTime"></span>
                    </div>
                    <div class="message-text">
                        Welcome to the AI Assistant. How can I help you today?
                    </div>
                </div>
            </div>
        </div>
        
        <div class="chat-input-area">
            <form id="chatForm">
                <div class="input-container">
                    <textarea 
                        id="userInput" 
                        placeholder="Type your message..."
                        rows="1"
                        required
                    ></textarea>
                    <button type="submit" id="sendButton">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <line x1="22" y1="2" x2="11" y2="13"></line>
                            <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                        </svg>
                        <span>SEND</span>
                    </button>
                </div>
            </form>
        </div>
    </div>
    
    <script>
        // ============================================
        // CONFIGURATION - ADD YOUR GROQ API KEY HERE
        // ============================================
        const GROQ_API_KEY = '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'; // Replace with your actual key
        
        // ============================================
        // CHAT FUNCTIONALITY
        // ============================================
        const chatMessages = document.getElementById('chatMessages');
        const chatForm = document.getElementById('chatForm');
        const userInput = document.getElementById('userInput');
        const sendButton = document.getElementById('sendButton');

        // Set initial timestamp
        document.getElementById('initialTime').textContent = getCurrentTime();

        // Auto-resize textarea
        userInput.addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = (this.scrollHeight) + 'px';
        });

        // Handle Enter key
        userInput.addEventListener('keydown', function(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                chatForm.dispatchEvent(new Event('submit'));
            }
        });

        // Handle form submission
        chatForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const message = userInput.value.trim();
            if (!message) return;
            
            // Add user message
            addMessage(message, 'user');
            
            // Clear input
            userInput.value = '';
            userInput.style.height = 'auto';
            
            // Disable input
            sendButton.disabled = true;
            userInput.disabled = true;
            
            // Show typing indicator
            const typingId = showTypingIndicator();
            
            try {
                // Call Groq API directly from browser
                const response = await fetch('https://api.groq.com/openai/v1/chat/completions', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${GROQ_API_KEY}`
                    },
                    body: JSON.stringify({
                        model: 'llama-3.3-70b-versatile',
                        messages: [
                            { 
                                role: 'system', 
                                content: 'You are a helpful AI assistant. Be concise, friendly, and informative in your responses.' 
                            },
                            { 
                                role: 'user', 
                                content: message 
                            }
                        ],
                        max_tokens: 1000,
                        temperature: 0.7
                    })
                });

                const data = await response.json();
                
                if (!response.ok) {
                    throw new Error(data.error?.message || 'API error');
                }

                removeTypingIndicator(typingId);
                addMessage(data.choices[0].message.content, 'bot');
                
            } catch (error) {
                console.error('Error:', error);
                removeTypingIndicator(typingId);
                
                if (GROQ_API_KEY === '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') {
                    addMessage('⚠️ Please add your Groq API key in the script section at the top of this HTML file. Replace "YOUR_GROQ_API_KEY_HERE" with your actual API key.', 'bot');
                } else {
                    addMessage('Connection error. Please check your API key and try again. Error: ' + error.message, 'bot');
                }
            } finally {
                sendButton.disabled = false;
                userInput.disabled = false;
                userInput.focus();
            }
        });

        function getCurrentTime() {
            const now = new Date();
            return now.toLocaleTimeString('en-US', { 
                hour: '2-digit', 
                minute: '2-digit',
                hour12: true 
            });
        }

        function addMessage(text, sender) {
            const wrapper = document.createElement('div');
            wrapper.className = `message-wrapper ${sender}`;
            
            const bubble = document.createElement('div');
            bubble.className = 'message-bubble';
            
            const header = document.createElement('div');
            header.className = 'message-header';
            
            const senderSpan = document.createElement('span');
            senderSpan.className = 'sender';
            senderSpan.textContent = sender === 'user' ? 'YOU' : 'SYSTEM';
            
            const timestamp = document.createElement('span');
            timestamp.className = 'timestamp';
            timestamp.textContent = getCurrentTime();
            
            header.appendChild(senderSpan);
            header.appendChild(timestamp);
            
            const messageText = document.createElement('div');
            messageText.className = 'message-text';
            messageText.textContent = text;
            
            bubble.appendChild(header);
            bubble.appendChild(messageText);
            wrapper.appendChild(bubble);
            
            chatMessages.appendChild(wrapper);
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        function showTypingIndicator() {
            const wrapper = document.createElement('div');
            wrapper.className = 'message-wrapper bot';
            wrapper.id = 'typing-' + Date.now();
            
            const bubble = document.createElement('div');
            bubble.className = 'message-bubble';
            
            const header = document.createElement('div');
            header.className = 'message-header';
            
            const senderSpan = document.createElement('span');
            senderSpan.className = 'sender';
            senderSpan.textContent = 'SYSTEM';
            
            const timestamp = document.createElement('span');
            timestamp.className = 'timestamp';
            timestamp.textContent = getCurrentTime();
            
            header.appendChild(senderSpan);
            header.appendChild(timestamp);
            
            const typing = document.createElement('div');
            typing.className = 'typing-indicator';
            typing.innerHTML = '<span></span><span></span><span></span>';
            
            bubble.appendChild(header);
            bubble.appendChild(typing);
            wrapper.appendChild(bubble);
            
            chatMessages.appendChild(wrapper);
            chatMessages.scrollTop = chatMessages.scrollHeight;
            
            return wrapper.id;
        }

        function removeTypingIndicator(id) {
            const element = document.getElementById(id);
            if (element) {
                element.remove();
            }
        }
    </script>
</body>
</html>
