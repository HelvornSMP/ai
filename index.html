<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Helvorn AI</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Space+Grotesk:wght@300;500;700&display=swap" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --dark-bg: #0a0a0a;
            --dark-surface: #141414;
            --dark-elevated: #1a1a1a;
            --gold: #c9b458;
            --gold-dim: #a89548;
            --gold-glow: rgba(201, 180, 88, 0.3);
            --text-main: #ffffff;
            --text-secondary: #a0a0a0;
            --text-muted: #707070;
            --border-color: #252525;
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.1);
            --danger: #ef4444;
            --success: #22c55e;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Outfit', -apple-system, system-ui, sans-serif;
            background: var(--dark-bg);
            background-image: 
                radial-gradient(circle at top right, rgba(201, 180, 88, 0.05), transparent 400px),
                radial-gradient(circle at bottom left, rgba(201, 180, 88, 0.05), transparent 400px);
            color: var(--text-main);
            line-height: 1.6;
            overflow-x: hidden;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .main-container {
            width: 100%;
            max-width: 1400px;
            height: 90vh;
            max-height: 900px;
            display: flex;
            gap: 20px;
            position: relative;
        }

        .sidebar {
            width: 320px;
            background: var(--dark-surface);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            transition: transform 0.3s ease;
        }

        .sidebar-header {
            padding: 24px 20px;
            border-bottom: 1px solid var(--border-color);
        }

        .sidebar-header h2 {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 18px;
            font-weight: 700;
            letter-spacing: 2px;
            color: var(--gold);
            margin-bottom: 16px;
        }

        .new-chat-btn {
            width: 100%;
            padding: 14px;
            background: var(--gold);
            color: #000;
            border: none;
            border-radius: 12px;
            font-family: 'Space Grotesk', sans-serif;
            font-size: 13px;
            font-weight: 700;
            letter-spacing: 1.5px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            box-shadow: 0 4px 12px var(--gold-glow);
        }

        .new-chat-btn:hover {
            background: #ffd95e;
            transform: translateY(-2px);
            box-shadow: 0 6px 20px var(--gold-glow);
        }

        .chat-list {
            flex: 1;
            overflow-y: auto;
            padding: 12px;
        }

        .chat-item {
            padding: 14px 16px;
            margin-bottom: 8px;
            background: var(--dark-elevated);
            border: 1px solid transparent;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 10px;
        }

        .chat-item:hover {
            background: var(--glass-bg);
            border-color: var(--border-color);
        }

        .chat-item.active {
            background: rgba(201, 180, 88, 0.1);
            border-color: var(--gold);
        }

        .chat-item-content {
            flex: 1;
            min-width: 0;
        }

        .chat-item-title {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-main);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            margin-bottom: 4px;
        }

        .chat-item-preview {
            font-size: 12px;
            color: var(--text-secondary);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .delete-chat-btn {
            padding: 6px 10px;
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.3);
            border-radius: 6px;
            color: var(--danger);
            font-size: 11px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 600;
        }

        .delete-chat-btn:hover {
            background: rgba(239, 68, 68, 0.2);
            border-color: var(--danger);
        }

        .chat-list::-webkit-scrollbar {
            width: 6px;
        }

        .chat-list::-webkit-scrollbar-track {
            background: var(--dark-elevated);
            border-radius: 3px;
        }

        .chat-list::-webkit-scrollbar-thumb {
            background: var(--gold);
            border-radius: 3px;
        }

        .container {
            flex: 1;
            background: var(--dark-surface);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            display: flex;
            flex-direction: column;
            position: relative;
            overflow: hidden;
        }

        .chat-header {
            padding: 24px 32px 20px;
            border-bottom: 1px solid var(--border-color);
            position: relative;
        }

        .header-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }

        .chat-header h1 {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 28px;
            font-weight: 800;
            letter-spacing: 2px;
            background: linear-gradient(135deg, var(--gold), #ffd95e);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .status-badge {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 16px;
            background: rgba(201, 180, 88, 0.1);
            border: 1px solid rgba(201, 180, 88, 0.3);
            border-radius: 20px;
            font-size: 13px;
            font-weight: 600;
            letter-spacing: 1px;
        }

        .pulse {
            width: 8px;
            height: 8px;
            background: var(--success);
            border-radius: 50%;
            box-shadow: 0 0 8px var(--success);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.7; transform: scale(1.1); }
        }

        .header-actions {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .action-btn {
            padding: 8px 16px;
            background: var(--dark-elevated);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            color: var(--text-main);
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: inherit;
        }

        .action-btn:hover {
            background: var(--glass-bg);
            border-color: var(--gold);
            color: var(--gold);
        }

        .model-selector {
            padding: 8px 12px;
            background: var(--dark-elevated);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            color: var(--text-main);
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            font-family: inherit;
            transition: all 0.3s ease;
        }

        .model-selector:hover {
            border-color: var(--gold);
        }

        .model-selector:focus {
            outline: none;
            border-color: var(--gold);
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 28px 32px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .chat-messages::-webkit-scrollbar {
            width: 8px;
        }

        .chat-messages::-webkit-scrollbar-track {
            background: var(--dark-elevated);
            border-radius: 4px;
        }

        .chat-messages::-webkit-scrollbar-thumb {
            background: var(--gold);
            border-radius: 4px;
        }

        .message-wrapper {
            display: flex;
            animation: messageSlide 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes messageSlide {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message-wrapper.user {
            justify-content: flex-end;
        }

        .message-bubble {
            max-width: 75%;
            padding: 16px 20px;
            border-radius: 12px;
            position: relative;
        }

        .message-wrapper.bot .message-bubble {
            background: var(--dark-elevated);
            border: 1px solid var(--border-color);
            border-left: 3px solid var(--gold);
        }

        .message-wrapper.user .message-bubble {
            background: linear-gradient(135deg, var(--gold), var(--gold-dim));
            color: #000;
            box-shadow: 0 4px 16px var(--gold-glow);
        }

        .message-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 1px;
            opacity: 0.8;
        }

        .sender {
            color: var(--gold);
        }

        .message-wrapper.user .sender {
            color: rgba(0, 0, 0, 0.7);
        }

        .timestamp {
            color: var(--text-secondary);
            font-size: 10px;
        }

        .message-wrapper.user .timestamp {
            color: rgba(0, 0, 0, 0.6);
        }

        .message-text {
            line-height: 1.6;
            font-size: 15px;
            font-weight: 400;
            white-space: pre-wrap;
            word-wrap: break-word;
        }

        .message-actions {
            display: flex;
            gap: 8px;
            margin-top: 12px;
            padding-top: 10px;
            border-top: 1px solid var(--border-color);
        }

        .message-wrapper.user .message-actions {
            border-top-color: rgba(0, 0, 0, 0.2);
        }

        .copy-message-btn {
            padding: 6px 12px;
            background: var(--dark-elevated);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            color: var(--text-secondary);
            font-size: 11px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .copy-message-btn:hover {
            background: var(--glass-bg);
            border-color: var(--gold);
            color: var(--gold);
        }

        .copy-message-btn.copied {
            background: rgba(34, 197, 94, 0.1);
            border-color: var(--success);
            color: var(--success);
        }

        .message-wrapper.user .copy-message-btn {
            background: rgba(0, 0, 0, 0.2);
            border-color: rgba(0, 0, 0, 0.3);
            color: rgba(0, 0, 0, 0.7);
        }

        .message-wrapper.user .copy-message-btn:hover {
            background: rgba(0, 0, 0, 0.3);
            border-color: rgba(0, 0, 0, 0.5);
            color: #000;
        }

        .code-block {
            position: relative;
            margin: 12px 0;
            background: #1a1a1a;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            overflow: hidden;
        }

        .code-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 12px;
            background: var(--dark-elevated);
            border-bottom: 1px solid var(--border-color);
        }

        .code-language {
            font-size: 11px;
            font-weight: 600;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .copy-code-btn {
            padding: 4px 10px;
            background: var(--dark-surface);
            border: 1px solid var(--border-color);
            border-radius: 4px;
            color: var(--text-secondary);
            font-size: 10px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .copy-code-btn:hover {
            background: var(--glass-bg);
            border-color: var(--gold);
            color: var(--gold);
        }

        .copy-code-btn.copied {
            background: rgba(34, 197, 94, 0.1);
            border-color: var(--success);
            color: var(--success);
        }

        .code-content {
            padding: 16px;
            overflow-x: auto;
        }

        .code-content pre {
            margin: 0;
            font-family: 'Courier New', monospace;
            font-size: 13px;
            line-height: 1.6;
            color: #e0e0e0;
        }

        .code-content code {
            font-family: 'Courier New', monospace;
        }

        .code-content::-webkit-scrollbar {
            height: 8px;
        }

        .code-content::-webkit-scrollbar-track {
            background: var(--dark-surface);
        }

        .code-content::-webkit-scrollbar-thumb {
            background: var(--gold-dim);
            border-radius: 4px;
        }

        .inline-code {
            padding: 2px 6px;
            background: var(--dark-elevated);
            border: 1px solid var(--border-color);
            border-radius: 4px;
            font-family: 'Courier New', monospace;
            font-size: 13px;
            color: var(--gold);
        }

        .message-wrapper.user .inline-code {
            background: rgba(0, 0, 0, 0.2);
            border-color: rgba(0, 0, 0, 0.3);
            color: rgba(0, 0, 0, 0.8);
        }

        .typing-indicator {
            display: flex;
            gap: 6px;
            padding: 10px 0;
        }

        .typing-indicator span {
            width: 8px;
            height: 8px;
            background: var(--gold);
            border-radius: 50%;
            animation: typing 1.4s infinite;
        }

        .typing-indicator span:nth-child(2) {
            animation-delay: 0.2s;
        }

        .typing-indicator span:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes typing {
            0%, 60%, 100% {
                transform: translateY(0);
                opacity: 0.7;
            }
            30% {
                transform: translateY(-10px);
                opacity: 1;
            }
        }

        .chat-input-area {
            padding: 20px 32px 24px;
            background: var(--dark-elevated);
            border-top: 1px solid var(--border-color);
        }

        .input-container {
            display: flex;
            gap: 12px;
            align-items: flex-end;
        }

        #userInput {
            flex: 1;
            padding: 14px 18px;
            background: var(--dark-surface);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            color: var(--text-main);
            font-family: 'Outfit', sans-serif;
            font-size: 15px;
            font-weight: 400;
            resize: none;
            max-height: 120px;
            transition: all 0.3s ease;
        }

        #userInput:focus {
            outline: none;
            border-color: var(--gold);
            box-shadow: 0 0 0 3px var(--gold-glow);
        }

        #userInput::placeholder {
            color: var(--text-secondary);
        }

        #sendButton {
            padding: 14px 24px;
            background: var(--gold);
            color: #000;
            border: none;
            border-radius: 12px;
            font-family: 'Space Grotesk', sans-serif;
            font-size: 13px;
            font-weight: 700;
            letter-spacing: 1.5px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 12px var(--gold-glow);
        }

        #sendButton:hover {
            background: #ffd95e;
            transform: translateY(-2px);
            box-shadow: 0 6px 20px var(--gold-glow);
        }

        #sendButton:active {
            transform: translateY(0);
        }

        #sendButton:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .toggle-sidebar-btn {
            display: none;
            position: fixed;
            top: 20px;
            left: 20px;
            padding: 12px;
            background: var(--gold);
            color: #000;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            z-index: 1001;
            box-shadow: 0 4px 12px var(--gold-glow);
            transition: all 0.3s ease;
        }

        .toggle-sidebar-btn:hover {
            background: #ffd95e;
            transform: scale(1.05);
        }

        .sidebar-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            z-index: 999;
            backdrop-filter: blur(4px);
        }

        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            padding: 40px;
            text-align: center;
        }

        .empty-state h3 {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 12px;
            background: linear-gradient(135deg, var(--gold), #ffd95e);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .empty-state p {
            color: var(--text-secondary);
            font-size: 15px;
            line-height: 1.6;
            max-width: 500px;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(4px);
            z-index: 2000;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: var(--dark-surface);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 32px;
            max-width: 500px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }

        .modal-header h3 {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 20px;
            font-weight: 700;
            color: var(--gold);
        }

        .close-modal {
            background: transparent;
            border: none;
            color: var(--text-secondary);
            font-size: 24px;
            cursor: pointer;
            transition: color 0.3s;
        }

        .close-modal:hover {
            color: var(--text-main);
        }

        .modal-body {
            margin-bottom: 24px;
        }

        .modal-body p {
            color: var(--text-secondary);
            margin-bottom: 16px;
            line-height: 1.6;
        }

        .file-input-wrapper {
            position: relative;
            overflow: hidden;
            display: inline-block;
            width: 100%;
        }

        .file-input-wrapper input[type=file] {
            position: absolute;
            left: -9999px;
        }

        .file-input-label {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 14px;
            background: var(--dark-elevated);
            border: 2px dashed var(--border-color);
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s;
            color: var(--text-secondary);
            font-weight: 600;
        }

        .file-input-label:hover {
            border-color: var(--gold);
            color: var(--gold);
        }

        .modal-footer {
            display: flex;
            gap: 12px;
            justify-content: flex-end;
        }

        .modal-btn {
            padding: 12px 24px;
            border: none;
            border-radius: 10px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            font-family: inherit;
        }

        .modal-btn.primary {
            background: var(--gold);
            color: #000;
        }

        .modal-btn.primary:hover {
            background: #ffd95e;
        }

        .modal-btn.secondary {
            background: var(--dark-elevated);
            color: var(--text-main);
            border: 1px solid var(--border-color);
        }

        .modal-btn.secondary:hover {
            border-color: var(--gold);
        }

        @media (max-width: 1024px) {
            body {
                padding: 0;
            }

            .main-container {
                height: 100vh;
                max-height: 100vh;
                gap: 0;
            }

            .sidebar {
                position: fixed;
                left: 0;
                top: 0;
                height: 100vh;
                width: 320px;
                border-radius: 0;
                border-left: none;
                transform: translateX(-100%);
                z-index: 1000;
            }

            .sidebar.open {
                transform: translateX(0);
            }

            .sidebar-overlay.active {
                display: block;
            }

            .toggle-sidebar-btn {
                display: flex;
            }

            .container {
                border-radius: 0;
                border: none;
                border-left: 1px solid var(--border-color);
            }

            .chat-header {
                padding: 60px 20px 16px 20px;
            }

            .chat-messages {
                padding: 20px;
            }

            .chat-input-area {
                padding: 16px 20px 20px;
            }
        }

        @media (max-width: 768px) {
            .chat-header h1 {
                font-size: 22px;
            }

            .header-actions {
                width: 100%;
            }

            .action-btn, .model-selector {
                flex: 1;
                font-size: 11px;
                padding: 8px 12px;
            }

            .message-bubble {
                max-width: 85%;
            }

            #sendButton span {
                display: none;
            }

            #sendButton {
                padding: 14px;
            }

            .sidebar {
                width: 280px;
            }

            .modal-content {
                padding: 24px;
            }
        }
    </style>
</head>
<body>
    <button class="toggle-sidebar-btn" id="toggleSidebar">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <line x1="3" y1="12" x2="21" y2="12"></line>
            <line x1="3" y1="6" x2="21" y2="6"></line>
            <line x1="3" y1="18" x2="21" y2="18"></line>
        </svg>
    </button>

    <div class="sidebar-overlay" id="sidebarOverlay"></div>

    <div class="main-container">
        <div class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <h2>CONVERSATIONS</h2>
                <button class="new-chat-btn" id="newChatBtn">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                        <line x1="12" y1="5" x2="12" y2="19"></line>
                        <line x1="5" y1="12" x2="19" y2="12"></line>
                    </svg>
                    NEW CHAT
                </button>
            </div>
            <div class="chat-list" id="chatList"></div>
        </div>

        <div class="container">
            <div class="chat-header">
                <div class="header-content">
                    <h1>HELVORN AI</h1>
                    <div class="status-badge">
                        <span class="pulse"></span>
                        <span>ONLINE</span>
                    </div>
                </div>
                <div class="header-actions">
                    <select class="model-selector" id="modelSelector">
                        <option value="llama-3.3-70b-versatile">Llama 3.3 70B (Balanced)</option>
                        <option value="llama-3.1-8b-instant">Llama 3.1 8B (Fast)</option>
                        <option value="mixtral-8x7b-32768">Mixtral 8x7B (Long Context)</option>
                        <option value="gemma2-9b-it">Gemma 2 9B (Alternative)</option>
                    </select>
                    <button class="action-btn" id="clearMemoryBtn">Clear Memory</button>
                    <button class="action-btn" id="importChatBtn">Import Chat</button>
                    <button class="action-btn" id="exportChatBtn">Export Chat</button>
                </div>
            </div>
            
            <div class="chat-messages" id="chatMessages"></div>
            
            <div class="chat-input-area">
                <form id="chatForm">
                    <div class="input-container">
                        <textarea 
                            id="userInput" 
                            placeholder="Type your message..."
                            rows="1"
                            required
                        ></textarea>
                        <button type="submit" id="sendButton">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                                <line x1="22" y1="2" x2="11" y2="13"></line>
                                <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                            </svg>
                            <span>SEND</span>
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- Import Modal -->
    <div class="modal" id="importModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Import Chat</h3>
                <button class="close-modal" onclick="closeImportModal()">×</button>
            </div>
            <div class="modal-body">
                <p>Select a previously exported chat file (.json) to continue your conversation on this device.</p>
                <div class="file-input-wrapper">
                    <input type="file" id="chatFileInput" accept=".json" />
                    <label for="chatFileInput" class="file-input-label">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                            <polyline points="17 8 12 3 7 8"></polyline>
                            <line x1="12" y1="3" x2="12" y2="15"></line>
                        </svg>
                        Choose File
                    </label>
                </div>
            </div>
            <div class="modal-footer">
                <button class="modal-btn secondary" onclick="closeImportModal()">Cancel</button>
            </div>
        </div>
    </div>
    
    <script>
        // ============================================
        // CONFIGURATION - ADD YOUR GROQ API KEY HERE
        // ============================================
        const GROQ_API_KEY = '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';
        
        // ============================================
        // STORAGE & STATE MANAGEMENT
        // ============================================
        class ChatManager {
            constructor() {
                this.chats = this.loadChats();
                this.currentChatId = this.loadCurrentChatId();
                this.conversationMemory = this.loadMemory();
                this.currentModel = this.loadModel();
                
                if (this.chats.length === 0) {
                    this.createNewChat();
                }
            }

            loadChats() {
                const saved = localStorage.getItem('helvorn_chats');
                return saved ? JSON.parse(saved) : [];
            }

            saveChats() {
                localStorage.setItem('helvorn_chats', JSON.stringify(this.chats));
            }

            loadCurrentChatId() {
                return localStorage.getItem('helvorn_currentChatId');
            }

            saveCurrentChatId() {
                localStorage.setItem('helvorn_currentChatId', this.currentChatId);
            }

            loadMemory() {
                const saved = localStorage.getItem('helvorn_memory');
                return saved ? JSON.parse(saved) : [];
            }

            saveMemory() {
                localStorage.setItem('helvorn_memory', JSON.stringify(this.conversationMemory));
            }

            loadModel() {
                return localStorage.getItem('helvorn_model') || 'llama-3.3-70b-versatile';
            }

            saveModel(model) {
                this.currentModel = model;
                localStorage.setItem('helvorn_model', model);
            }

            createNewChat() {
                const chatId = 'chat_' + Date.now();
                const newChat = {
                    id: chatId,
                    title: 'New Chat',
                    messages: [],
                    createdAt: new Date().toISOString(),
                    lastMessageAt: new Date().toISOString()
                };
                this.chats.unshift(newChat);
                this.currentChatId = chatId;
                this.saveChats();
                this.saveCurrentChatId();
                return newChat;
            }

            getCurrentChat() {
                return this.chats.find(chat => chat.id === this.currentChatId) || this.chats[0];
            }

            updateChatTitle(chatId, message) {
                const chat = this.chats.find(c => c.id === chatId);
                if (chat && chat.title === 'New Chat') {
                    chat.title = message.substring(0, 35) + (message.length > 35 ? '...' : '');
                    this.saveChats();
                }
            }

            addMessage(chatId, sender, text) {
                const chat = this.chats.find(c => c.id === chatId);
                if (chat) {
                    chat.messages.push({
                        sender,
                        text,
                        timestamp: new Date().toISOString()
                    });
                    chat.lastMessageAt = new Date().toISOString();
                    this.saveChats();

                    if (sender === 'user') {
                        this.updateChatTitle(chatId, text);
                    }

                    this.conversationMemory.push({ 
                        role: sender === 'user' ? 'user' : 'assistant', 
                        content: text 
                    });
                    if (this.conversationMemory.length > 20) {
                        this.conversationMemory = this.conversationMemory.slice(-20);
                    }
                    this.saveMemory();
                }
            }

            deleteChat(chatId) {
                this.chats = this.chats.filter(chat => chat.id !== chatId);
                this.saveChats();
                
                if (this.currentChatId === chatId) {
                    if (this.chats.length > 0) {
                        this.currentChatId = this.chats[0].id;
                    } else {
                        this.createNewChat();
                    }
                    this.saveCurrentChatId();
                }
            }

            switchChat(chatId) {
                this.currentChatId = chatId;
                this.saveCurrentChatId();
                
                const chat = this.getCurrentChat();
                this.conversationMemory = chat.messages.map(msg => ({
                    role: msg.sender === 'user' ? 'user' : 'assistant',
                    content: msg.text
                }));
                this.saveMemory();
            }

            clearMemory() {
                this.conversationMemory = [];
                this.saveMemory();
            }

            exportChat() {
                const chat = this.getCurrentChat();
                const exportData = {
                    title: chat.title,
                    createdAt: chat.createdAt,
                    messages: chat.messages,
                    exportedAt: new Date().toISOString(),
                    version: '1.0'
                };
                
                const dataStr = JSON.stringify(exportData, null, 2);
                const dataBlob = new Blob([dataStr], { type: 'application/json' });
                const url = URL.createObjectURL(dataBlob);
                const link = document.createElement('a');
                link.href = url;
                link.download = `helvorn_${chat.title.replace(/[^a-z0-9]/gi, '_')}_${Date.now()}.json`;
                link.click();
                URL.revokeObjectURL(url);
            }

            importChat(fileData) {
                try {
                    const data = JSON.parse(fileData);
                    
                    if (!data.messages || !Array.isArray(data.messages)) {
                        throw new Error('Invalid chat file format');
                    }

                    const chatId = 'chat_' + Date.now();
                    const importedChat = {
                        id: chatId,
                        title: data.title || 'Imported Chat',
                        messages: data.messages,
                        createdAt: data.createdAt || new Date().toISOString(),
                        lastMessageAt: new Date().toISOString()
                    };

                    this.chats.unshift(importedChat);
                    this.currentChatId = chatId;
                    this.saveChats();
                    this.saveCurrentChatId();
                    
                    this.conversationMemory = data.messages.map(msg => ({
                        role: msg.sender === 'user' ? 'user' : 'assistant',
                        content: msg.text
                    }));
                    this.saveMemory();

                    return true;
                } catch (error) {
                    console.error('Import error:', error);
                    return false;
                }
            }
        }

        // ============================================
        // UI MANAGEMENT
        // ============================================
        const chatManager = new ChatManager();
        const chatMessages = document.getElementById('chatMessages');
        const chatForm = document.getElementById('chatForm');
        const userInput = document.getElementById('userInput');
        const sendButton = document.getElementById('sendButton');
        const chatList = document.getElementById('chatList');
        const newChatBtn = document.getElementById('newChatBtn');
        const clearMemoryBtn = document.getElementById('clearMemoryBtn');
        const exportChatBtn = document.getElementById('exportChatBtn');
        const importChatBtn = document.getElementById('importChatBtn');
        const toggleSidebarBtn = document.getElementById('toggleSidebar');
        const sidebar = document.getElementById('sidebar');
        const sidebarOverlay = document.getElementById('sidebarOverlay');
        const modelSelector = document.getElementById('modelSelector');
        const importModal = document.getElementById('importModal');
        const chatFileInput = document.getElementById('chatFileInput');

        // Initialize UI
        modelSelector.value = chatManager.currentModel;
        renderChatList();
        loadCurrentChat();

        // Event Listeners
        newChatBtn.addEventListener('click', () => {
            chatManager.createNewChat();
            renderChatList();
            loadCurrentChat();
            closeSidebar();
        });

        clearMemoryBtn.addEventListener('click', () => {
            if (confirm('Clear conversation memory? The AI will forget previous context.')) {
                chatManager.clearMemory();
                addSystemMessage('Memory cleared. Starting fresh conversation.');
            }
        });

        exportChatBtn.addEventListener('click', () => {
            chatManager.exportChat();
            addSystemMessage('Chat exported successfully!');
        });

        importChatBtn.addEventListener('click', () => {
            importModal.classList.add('active');
        });

        chatFileInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (event) => {
                    const success = chatManager.importChat(event.target.result);
                    if (success) {
                        closeImportModal();
                        renderChatList();
                        loadCurrentChat();
                        addSystemMessage('Chat imported successfully!');
                    } else {
                        alert('Failed to import chat. Please check the file format.');
                    }
                };
                reader.readAsText(file);
            }
        });

        modelSelector.addEventListener('change', (e) => {
            chatManager.saveModel(e.target.value);
            addSystemMessage(`Switched to ${e.target.options[e.target.selectedIndex].text}`);
        });

        toggleSidebarBtn.addEventListener('click', () => {
            sidebar.classList.toggle('open');
            sidebarOverlay.classList.toggle('active');
        });

        sidebarOverlay.addEventListener('click', closeSidebar);

        userInput.addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = (this.scrollHeight) + 'px';
        });

        userInput.addEventListener('keydown', function(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                chatForm.dispatchEvent(new Event('submit'));
            }
        });

        chatForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const message = userInput.value.trim();
            if (!message) return;
            
            addMessage(message, 'user');
            chatManager.addMessage(chatManager.currentChatId, 'user', message);
            renderChatList();
            
            userInput.value = '';
            userInput.style.height = 'auto';
            
            sendButton.disabled = true;
            userInput.disabled = true;
            
            const typingId = showTypingIndicator();
            
            try {
                const messages = [
                    { 
                        role: 'system', 
                        content: 'You are Helvorn, a helpful and knowledgeable AI assistant. You remember previous conversations and provide personalized, accurate responses. Be friendly, concise, and engaging.' 
                    },
                    ...chatManager.conversationMemory
                ];

                const response = await fetch('https://api.groq.com/openai/v1/chat/completions', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${GROQ_API_KEY}`
                    },
                    body: JSON.stringify({
                        model: chatManager.currentModel,
                        messages: messages,
                        max_tokens: 2000,
                        temperature: 0.7
                    })
                });

                const data = await response.json();
                
                if (!response.ok) {
                    throw new Error(data.error?.message || 'API error');
                }

                removeTypingIndicator(typingId);
                const aiResponse = data.choices[0].message.content;
                addMessage(aiResponse, 'bot');
                chatManager.addMessage(chatManager.currentChatId, 'bot', aiResponse);
                renderChatList();
                
            } catch (error) {
                console.error('Error:', error);
                removeTypingIndicator(typingId);
                
                if (GROQ_API_KEY === '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') {
                    addMessage('⚠️ API key not configured. Please add your Groq API key in the script section.', 'bot');
                } else {
                    addMessage('Connection error: ' + error.message, 'bot');
                }
            } finally {
                sendButton.disabled = false;
                userInput.disabled = false;
                userInput.focus();
            }
        });

        function closeImportModal() {
            importModal.classList.remove('active');
            chatFileInput.value = '';
        }

        function closeSidebar() {
            sidebar.classList.remove('open');
            sidebarOverlay.classList.remove('active');
        }

        function renderChatList() {
            chatList.innerHTML = '';
            
            if (chatManager.chats.length === 0) {
                chatList.innerHTML = '<div style="padding: 20px; text-align: center; color: var(--text-secondary); font-size: 14px;">No conversations yet</div>';
                return;
            }

            chatManager.chats.forEach(chat => {
                const chatItem = document.createElement('div');
                chatItem.className = 'chat-item' + (chat.id === chatManager.currentChatId ? ' active' : '');
                
                const lastMessage = chat.messages.length > 0 
                    ? chat.messages[chat.messages.length - 1].text 
                    : 'No messages yet';

                chatItem.innerHTML = `
                    <div class="chat-item-content">
                        <div class="chat-item-title">${chat.title}</div>
                        <div class="chat-item-preview">${lastMessage}</div>
                    </div>
                    <div class="chat-item-actions">
                        <button class="delete-chat-btn" data-chat-id="${chat.id}">DEL</button>
                    </div>
                `;

                chatItem.querySelector('.chat-item-content').addEventListener('click', () => {
                    chatManager.switchChat(chat.id);
                    renderChatList();
                    loadCurrentChat();
                    closeSidebar();
                });

                chatItem.querySelector('.delete-chat-btn').addEventListener('click', (e) => {
                    e.stopPropagation();
                    if (confirm('Delete this conversation?')) {
                        chatManager.deleteChat(chat.id);
                        renderChatList();
                        loadCurrentChat();
                    }
                });

                chatList.appendChild(chatItem);
            });
        }

        function loadCurrentChat() {
            chatMessages.innerHTML = '';
            const currentChat = chatManager.getCurrentChat();
            
            if (!currentChat || currentChat.messages.length === 0) {
                showEmptyState();
                return;
            }

            currentChat.messages.forEach(msg => {
                addMessage(msg.text, msg.sender, false);
            });
        }

        function showEmptyState() {
            chatMessages.innerHTML = `
                <div class="empty-state">
                    <h3>Welcome to Helvorn AI</h3>
                    <p>Start a conversation by typing a message below. I'll remember our conversation and provide context-aware responses across all your chats.</p>
                </div>
            `;
        }

        function addMessage(text, sender, scroll = true) {
            const wrapper = document.createElement('div');
            wrapper.className = `message-wrapper ${sender}`;
            
            const bubble = document.createElement('div');
            bubble.className = 'message-bubble';
            
            const header = document.createElement('div');
            header.className = 'message-header';
            
            const senderSpan = document.createElement('span');
            senderSpan.className = 'sender';
            senderSpan.textContent = sender === 'user' ? 'YOU' : 'HELVORN';
            
            const timestamp = document.createElement('span');
            timestamp.className = 'timestamp';
            timestamp.textContent = getCurrentTime();
            
            header.appendChild(senderSpan);
            header.appendChild(timestamp);
            
            const messageText = document.createElement('div');
            messageText.className = 'message-text';
            
            // Parse code blocks and inline code
            const parsedContent = parseCodeBlocks(text);
            messageText.innerHTML = parsedContent;
            
            bubble.appendChild(header);
            bubble.appendChild(messageText);
            
            // Add copy button for bot messages
            if (sender === 'bot') {
                const actions = document.createElement('div');
                actions.className = 'message-actions';
                
                const copyBtn = document.createElement('button');
                copyBtn.className = 'copy-message-btn';
                copyBtn.innerHTML = `
                    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
                        <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
                    </svg>
                    Copy
                `;
                copyBtn.onclick = () => copyMessageText(text, copyBtn);
                
                actions.appendChild(copyBtn);
                bubble.appendChild(actions);
            }
            
            wrapper.appendChild(bubble);
            chatMessages.appendChild(wrapper);
            
            // Add copy functionality to code blocks
            wrapper.querySelectorAll('.copy-code-btn').forEach(btn => {
                btn.onclick = () => {
                    const code = btn.getAttribute('data-code');
                    copyToClipboard(code, btn);
                };
            });
            
            if (scroll) {
                chatMessages.scrollTop = chatMessages.scrollHeight;
            }
        }

        function parseCodeBlocks(text) {
            // Replace code blocks with syntax highlighting
            let html = text;
            
            // Match code blocks: ```language\ncode\n```
            const codeBlockRegex = /```(\w+)?\n([\s\S]*?)```/g;
            html = html.replace(codeBlockRegex, (match, language, code) => {
                const lang = language || 'code';
                const escapedCode = escapeHtml(code.trim());
                return `
                    <div class="code-block">
                        <div class="code-header">
                            <span class="code-language">${lang}</span>
                            <button class="copy-code-btn" data-code="${escapeHtml(code.trim())}">
                                <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
                                    <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
                                </svg>
                                Copy
                            </button>
                        </div>
                        <div class="code-content">
                            <pre><code>${escapedCode}</code></pre>
                        </div>
                    </div>
                `;
            });
            
            // Replace inline code: `code`
            const inlineCodeRegex = /`([^`]+)`/g;
            html = html.replace(inlineCodeRegex, (match, code) => {
                return `<span class="inline-code">${escapeHtml(code)}</span>`;
            });
            
            // Convert newlines to <br> for remaining text
            html = html.replace(/\n/g, '<br>');
            
            return html;
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function copyMessageText(text, button) {
            // Remove markdown code blocks for plain text copy
            const plainText = text.replace(/```[\w]*\n[\s\S]*?```/g, (match) => {
                return match.replace(/```[\w]*\n/, '').replace(/```$/, '');
            }).replace(/`([^`]+)`/g, '$1');
            
            copyToClipboard(plainText, button);
        }

        function copyToClipboard(text, button) {
            navigator.clipboard.writeText(text).then(() => {
                const originalHTML = button.innerHTML;
                button.classList.add('copied');
                button.innerHTML = `
                    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <polyline points="20 6 9 17 4 12"></polyline>
                    </svg>
                    Copied!
                `;
                
                setTimeout(() => {
                    button.classList.remove('copied');
                    button.innerHTML = originalHTML;
                }, 2000);
            }).catch(err => {
                console.error('Copy failed:', err);
            });
        }

        function addSystemMessage(text) {
            const wrapper = document.createElement('div');
            wrapper.style.textAlign = 'center';
            wrapper.style.padding = '10px';
            wrapper.style.color = 'var(--text-secondary)';
            wrapper.style.fontSize = '13px';
            wrapper.style.fontStyle = 'italic';
            wrapper.textContent = text;
            chatMessages.appendChild(wrapper);
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        function showTypingIndicator() {
            const wrapper = document.createElement('div');
            wrapper.className = 'message-wrapper bot';
            wrapper.id = 'typing-' + Date.now();
            
            const bubble = document.createElement('div');
            bubble.className = 'message-bubble';
            
            const header = document.createElement('div');
            header.className = 'message-header';
            
            const senderSpan = document.createElement('span');
            senderSpan.className = 'sender';
            senderSpan.textContent = 'HELVORN';
            
            const timestamp = document.createElement('span');
            timestamp.className = 'timestamp';
            timestamp.textContent = getCurrentTime();
            
            header.appendChild(senderSpan);
            header.appendChild(timestamp);
            
            const typing = document.createElement('div');
            typing.className = 'typing-indicator';
            typing.innerHTML = '<span></span><span></span><span></span>';
            
            bubble.appendChild(header);
            bubble.appendChild(typing);
            wrapper.appendChild(bubble);
            
            chatMessages.appendChild(wrapper);
            chatMessages.scrollTop = chatMessages.scrollHeight;
            
            return wrapper.id;
        }

        function removeTypingIndicator(id) {
            const element = document.getElementById(id);
            if (element) {
                element.remove();
            }
        }

        function getCurrentTime() {
            const now = new Date();
            return now.toLocaleTimeString('en-US', { 
                hour: '2-digit', 
                minute: '2-digit',
                hour12: true 
            });
        }
    </script>
</body>
